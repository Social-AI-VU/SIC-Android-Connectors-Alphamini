name: Build AlphaMini APKs

on:
  workflow_dispatch:
  push:
    paths:
      - "**"
      - "build_flow.yaml"
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APKs
        run: ./gradlew --no-daemon :camera_app:assembleRelease :mic_app:assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alphamini-release-apks
          path: |
            camera_app/build/outputs/apk/release/*.apk
            mic_app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            camera_app/build/outputs/apk/release/*.apk
            mic_app/build/outputs/apk/release/*.apk
